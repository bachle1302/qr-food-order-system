spring:
  application:
    name: rms-backend
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/rms}
      database: ${MONGODB_DATABASE:rms}
server:
  port: ${SERVER_PORT:8017}

jwt:
  secret: ${JWT_SECRET:Y2hhbmdlX21lX2Rldl9vbmx5X21pbmltdW1fMzJfY2hhcnM=}
  expiration: ${JWT_ACCESS_EXPIRATION_MS:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    public-order-per-minute: ${APP_RATE_LIMIT_PUBLIC_ORDER_PER_MINUTE:10}
    check-in-per-minute: ${APP_RATE_LIMIT_CHECK_IN_PER_MINUTE:20}
    status-per-minute: ${APP_RATE_LIMIT_STATUS_PER_MINUTE:60}
    table-qr-per-minute: ${APP_RATE_LIMIT_TABLE_QR_PER_MINUTE:60}

