services:
  mongodb:
    image: mongo:7.0
    container_name: qrfood-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-rms}

  backend:
    build:
      context: ./backend
    container_name: qrfood-backend
    depends_on:
      - mongodb
    ports:
      - "${SERVER_PORT:-8017}:8017"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8017}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/rms}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-rms}
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlX21lX2Rldl9vbmx5X21pbmltdW1fMzJfY2hhcnM=}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8017}
    container_name: qrfood-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8017}

volumes:
  mongodb_data:
